strimzi-kafka-operator:
  enabled: true
  generateNetworkPolicy: false
  extraEnvs:
    - name: STRIMZI_LABELS_EXCLUSION_PATTERN
      value: "argocd.argoproj.io/instance"
    - name: STRIMZI_KUBERNETES_VERSION
      value: "major=1,minor=34"
  resources:
    limits:
      memory: 512Mi
      cpu: 4

kafka:
  replicas: 1
  resources: {}
  storage:
    class: gp2
    size: 10Gi

  config:
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
    default.replication.factor: 1
    min.insync.replicas: 1

  zookeeper:
    replicas: 1
    resources: {}
    storage:
      class: gp2
      size: 10Gi
      deleteClaim: false

  topicOperator:
    resources: {}

  userOperator:
    resources: {}

  tlsSidecar:
    resources: {}

kafkaTopics:
  resumes:
    partitions: 1
    replicas: 1

elasticsearch:
  enabled: true
  # deploy 1 replica instead of 3
  replicas: 1
  imageTag: "7.17.26"
  # Shrink default JVM heap.
  esJavaOpts: "-Xmx128m -Xms128m"
  # Allocate smaller chunks of memory per pod.
  resources:
    requests:
      cpu: "100m"
      memory: "512M"
    limits:
      cpu: "1000m"
      memory: "512M"
  # Request smaller persistent volumes.
  volumeClaimTemplate:
    storageClassName: gp2
    accessModes: [ "ReadWriteOnce" ]
    resources:
      requests:
        storage: 10Gi
  secret:
    password: changeme
  podAnnotations:
    instrumentation.opentelemetry.io/container-names: elasticsearch
    instrumentation.opentelemetry.io/inject-java: otel-splunk/splunk-otel-collector
  lifecycle:
    postStart:
      exec:
        command:
          - bash
          - -c
          - |
            #!/bin/bash
            # Add a template to adjust number of shards/replicas
            SHARD_COUNT=1
            REPLICA_COUNT=0
            ES_URL=http://localhost:9200
            while [[ "$(curl -s -o /dev/null -w '%{http_code}\n' $ES_URL)" != "200" ]]; do sleep 1; done
            curl -XPUT "$ES_URL/_template/default" -H 'Content-Type: application/json' -d'{"index_patterns":['\""*"\"'],"order": -1,"settings":{"number_of_shards":'$SHARD_COUNT',"number_of_replicas":'$REPLICA_COUNT'}}'

networkPolicy:
  enabled: true
  enableDNSVisibility: true
  enableHTTPIngressVisibility: true
  enableKafkaIngressVisibility: false
  enableHTTPEgressVisibility: true
  enableKafkaEgressVisibility: true
  enableOtelEgress: true
  otelAgentEgressToEntities: true
  otelAgentNamespace: otel-splunk
  otelAgentAppLabel: splunk-otel-collector
  otelAgentComponentLabel: otel-collector-agent
  otelAgentOTLPHTTPPort: "4318"
  otelAgentOTLPGRPCPort: "4317"

debug: false

tracing:
  enabled: true
  otlpExporterEnabled: true
  otlpExporterHTTPEndpoint: http://$(HOST_IP):4318
  otlpExporterGRPCEndpoint: http://$(HOST_IP):4317
  logSpans: false

instrumentation:
  nodejs:
    enabled: true
    name: otel-splunk/splunk-otel-collector
  python:
    enabled: false
    name: otel-splunk/splunk-otel-collector

recruiter:
  image:
    repository: quay.io/isovalent/jobs-app-recruiter
    override:
    tag: "v0.12.1"
    useDigest: false
    digest: ~
  replicas: 1
  resources: {}
  ingress:
    enabled: false
    host: ~
    pathType: ~
    className: ~
    tls:
      enabled: false
      secretName: ~

jobposting:
  image:
    repository: quay.io/isovalent/jobs-app-jobposting
    override:
    tag: "v0.12.1"
    useDigest: false
    digest: ~
  replicas: 1
  resources: {}
  ingress:
    enabled: false
    host: ~
    pathType: ~
    className: ~
    tls:
      enabled: false
      secretName: ~

coreapi:
  image:
    repository: quay.io/isovalent/jobs-app-coreapi
    override:
    tag: "v0.12.1"
    useDigest: false
    digest: ~
  replicas: 1
  resources: {}
  # how often the API should return errors
  errorRate: '0.1'
  # how often the API should delay requests with a sleep
  sleepRate: '0.0'
  # lower bound on how long to sleep
  sleepLowerBound: '0.0'
  # upper bound on how long to sleep. Can set upper bound only to get a
  # constant delay.
  sleepUpperBound: '0.0'
  ingress:
    enabled: false
    host: ~
    pathType: ~
    className: ~
    tls:
      enabled: false
      secretName: ~

crawler:
  image:
    repository: quay.io/isovalent/jobs-app-crawler
    override:
    tag: "v0.12.1"
    useDigest: false
    digest: ~
  replicas: 1
  resources: {}
  crawlFrequencyLowerBound: 0.500
  crawlFrequencyUpperBound: 5
  http:
    # enable http queries to a given url every crawl tick.
    enabled: true
    # url must be defined when http is enabled, and start with either http://
    # or https://.
    url: 'http://api.github.com'
  revshell:
    # enable a simulation of application compromise. When enabled, the crawler
    # will spawn a netcat command to the revshell.uri after revshell.delay to
    # generate suspicious activity.
    enabled: false
    # target hostname queried by netcat
    host: "29ed272d6f0b5f81617b506732b403fe.not-reverse-shell.com"
    # target port queried by netcat
    port: 443
    # count of seconds after which the reverse shell is spawned, default to 5
    # minutes.
    delay: 300

resumes:
  image:
    repository: quay.io/isovalent/jobs-app-resumes
    override:
    tag: "v0.12.1"
    useDigest: false
    digest: ~
  replicas: 1
  waitForTopicImage: quay.io/strimzi/kafka:0.38.0-kafka-3.6.0
  # Maximum time (in seconds / 5) to wait for Kafka topic before starting anyway
  waitForTopicMaxRetries: 24  # 24 retries * 5 seconds = 2 minutes
  resources: {}

loader:
  image:
    repository: quay.io/isovalent/jobs-app-loader
    override:
    tag: "v0.12.1"
    useDigest: false
    digest: ~
  replicas: 1
  resources: {}
